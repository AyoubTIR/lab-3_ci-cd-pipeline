# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  pull_request:
    branches: [ "dev" ]
  push:
    branches: [ "main" ]

jobs:
  ci:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    # ------- Backend --------
    - run: npm ci
      working-directory: backend
      
    - run: npm run lint
      working-directory: backend
      env:
        ESLINT_USE_FLAT_CONFIG: false
      
    - run: npm audit --audit-level=high
      working-directory: backend

    - run: npm test
      working-directory: backend

    # ------- Frontend --------
    - run: npm ci
      working-directory: frontend
      
    - run: npm run lint
      working-directory: frontend
      
    - run: npm audit --audit-level=high
      working-directory: frontend

    - run: npm test
      working-directory: frontend
      env:
        CI: true

    # ------ Snyk ----------
    - name: Run Snyk security analysis
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --all-projects

    # ------ Docekr -------
    - run: docker build ./backend
    - run: docker build ./frontend

  cd:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Inject APP_SECRET_NAME into backend .env
        run: echo "APP_SECRET_NAME=${{ secrets.APP_SECRET_NAME }}" > backend/.env

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-testing-deploy:backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-testing-deploy:frontend
      




      
